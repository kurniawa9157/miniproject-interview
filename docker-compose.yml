services:
  db:
    image: postgres:16-alpine
    # POSTGRES_USER/PASSWORD/DB dibaca dari backend/.env (satu sumber password).
    env_file:
      - ./backend/.env
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Migration jalan otomatis saat volume pertama kali dibuat (urut alfabetis)
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - jumpapay
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      # Override DB_HOST ke service "db" (menimpa nilai di backend/.env yang
      # dipakai untuk dev lokal). Backend connect ke postgres via network.
      DB_HOST: db
    expose:
      - "8080" # hanya internal network, tidak di-publish ke host
    depends_on:
      db:
        condition: service_healthy
    networks:
      - jumpapay
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Kosong = API URL relatif, diproxy nginx ke backend (satu origin)
        VITE_API_URL: ""
    ports:
      # Arahkan Nginx Proxy Manager ke <host>:8090
      - "8877:80"
    depends_on:
      - backend
    networks:
      - jumpapay
    restart: unless-stopped

volumes:
  pgdata:

networks:
  jumpapay:
    driver: bridge
